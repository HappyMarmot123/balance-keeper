name: Frontend PR Review

on:
  pull_request:
    branches:
      - development
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  quality-gate:
    if: ${{ github.event.pull_request.draft != true }}
    name: quality-gate
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout merge result
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Activate pinned npm
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${RUNNER_TEMP}/corepack-shims"
          corepack enable npm --install-directory "${RUNNER_TEMP}/corepack-shims"
          corepack install --global npm@11.17.0
          npm_version="$("${RUNNER_TEMP}/corepack-shims/npm" --version)"
          test "${npm_version}" = '11.17.0'
          echo "${RUNNER_TEMP}/corepack-shims" >> "${GITHUB_PATH}"

      - name: Install dependencies
        run: npm ci

      - name: Check formatting and lint
        run: npm run check

      - name: Run tests
        run: npm test

      - name: Typecheck
        run: npm run typecheck

      - name: Build client and server
        run: npm run build

  codex-review:
    if: >-
      ${{
        needs.quality-gate.result == 'success' &&
        github.event.pull_request.draft != true &&
        github.event.pull_request.head.repo.full_name == github.repository &&
        github.event.pull_request.user.type != 'Bot' &&
        github.event.sender.type != 'Bot' &&
        vars.CODEX_REVIEW_ENABLED == 'true'
      }}
    name: codex-review
    needs: quality-gate
    outputs:
      final-message: ${{ steps.codex.outputs.final-message }}
      reviewed-head-sha: ${{ github.event.pull_request.head.sha }}
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout review target
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Prepare trusted review policy
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          TRUSTED_CODEX_HOME: ${{ runner.temp }}/balance-keeper-codex-home
          TRUSTED_POLICY_DIR: ${{ runner.temp }}/balance-keeper-review-policy
        run: |
          set -euo pipefail
          [[ "${BASE_SHA}" =~ ^[0-9a-f]{40}$ ]]
          [[ "${HEAD_SHA}" =~ ^[0-9a-f]{40}$ ]]
          git cat-file -e "${BASE_SHA}^{commit}"
          git cat-file -e "${HEAD_SHA}^{commit}"
          mkdir -p "${TRUSTED_CODEX_HOME}" "${TRUSTED_POLICY_DIR}"
          git show "${BASE_SHA}:.github/codex/prompts/clean-code-review.md" \
            > "${TRUSTED_POLICY_DIR}/clean-code-review.md"
          git show "${BASE_SHA}:.github/codex/schemas/clean-code-review.schema.json" \
            > "${TRUSTED_POLICY_DIR}/clean-code-review.schema.json"
          test -s "${TRUSTED_POLICY_DIR}/clean-code-review.md"
          test -s "${TRUSTED_POLICY_DIR}/clean-code-review.schema.json"
          printf '%s\n' \
            'project_doc_max_bytes = 0' \
            'project_doc_fallback_filenames = []' \
            'web_search = "disabled"' \
            '' \
            '[features]' \
            'hooks = false' \
            > "${TRUSTED_CODEX_HOME}/config.toml"

      - name: Review changed code
        id: codex
        uses: openai/codex-action@52fe01ec70a42f454c9d2ebd47598f9fd6893d56 # v1.11
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          REVIEW_WORKSPACE: ${{ github.workspace }}
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: ${{ runner.temp }}/balance-keeper-review-policy/clean-code-review.md
          output-schema-file: ${{ runner.temp }}/balance-keeper-review-policy/clean-code-review.schema.json
          codex-home: ${{ runner.temp }}/balance-keeper-codex-home
          working-directory: ${{ runner.temp }}/balance-keeper-review-policy
          permission-profile: ":read-only"
          safety-strategy: drop-sudo
          codex-version: "0.145.0"
          model: gpt-5.6-sol
          effort: high

  post-feedback:
    if: ${{ always() && !cancelled() && needs.codex-review.result != 'skipped' }}
    name: post-feedback
    needs: codex-review
    permissions:
      pull-requests: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Publish review feedback
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          CODEX_REVIEW_JSON: ${{ needs.codex-review.outputs.final-message }}
          CODEX_REVIEW_JOB_RESULT: ${{ needs.codex-review.result }}
          REVIEWED_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          REVIEWED_CHANGED_FILE_COUNT: ${{ github.event.pull_request.changed_files }}
          REVIEWED_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          REVIEW_POLICY_SHA: ${{ github.event.pull_request.base.sha }}
        with:
          github-token: ${{ github.token }}
          script: |
            const marker = '<!-- balance-keeper:codex-review -->';
            const maximumBytes = 60_000;
            const rootKeys = [
              'changeSummary',
              'findings',
              'regressionRisk',
              'reviewAreas',
              'status',
              'summary',
              'verificationLimits',
            ];
            const findingKeys = [
              'category',
              'impact',
              'line',
              'path',
              'reason',
              'recommendation',
              'severity',
              'title',
            ];
            const findingCategories = [
              'USER_IMPACT',
              'CORRECTNESS',
              'STATE_HANDLING',
              'ASYNC_FLOW',
              'ACCESSIBILITY',
              'TEST_COVERAGE',
              'READABILITY',
              'PREDICTABILITY',
              'COHESION',
              'COUPLING',
              'ARCHITECTURE',
              'SECURITY',
              'PERFORMANCE',
            ];
            const findingCategoryToArea = {
              USER_IMPACT: 'userImpact',
              CORRECTNESS: 'correctness',
              STATE_HANDLING: 'stateHandling',
              ASYNC_FLOW: 'asyncFlow',
              ACCESSIBILITY: 'accessibility',
              TEST_COVERAGE: 'testCoverage',
              READABILITY: 'readability',
              PREDICTABILITY: 'predictability',
              COHESION: 'cohesion',
              COUPLING: 'coupling',
              ARCHITECTURE: 'architecture',
              SECURITY: 'security',
              PERFORMANCE: 'performance',
            };
            const reviewAreaKeys = [
              'userImpact',
              'correctness',
              'stateHandling',
              'asyncFlow',
              'accessibility',
              'testCoverage',
              'readability',
              'predictability',
              'cohesion',
              'coupling',
              'architecture',
              'security',
              'performance',
            ];
            const blockedArea = {
              evidence: '자동 리뷰 출력을 충분히 확인하지 못해 이 검토 영역을 판정할 수 없습니다.',
              result: 'NOT_REVIEWED',
            };
            const blockedReview = {
              changeSummary: '자동 리뷰 실행 또는 출력 검증에 실패해 변경 내용을 충분히 확인하지 못했습니다.',
              findings: [],
              regressionRisk: '검토 결과를 안전하게 해석할 수 없어 변경의 회귀 위험을 판정하지 못했습니다.',
              reviewAreas: Object.fromEntries(
                reviewAreaKeys.map((area) => [area, { ...blockedArea }]),
              ),
              status: 'BLOCKED',
              summary: '자동 리뷰 결과를 안전하게 처리하지 못했습니다.',
              verificationLimits: [
                '자동 리뷰 실행 또는 출력 검증에 실패했습니다. Actions 로그를 확인해 주세요.',
              ],
            };

            const isPlainObject = (value) =>
              value !== null && typeof value === 'object' && !Array.isArray(value);
            const hasExactKeys = (value, expectedKeys) => {
              if (!isPlainObject(value)) {
                return false;
              }
              const actualKeys = Object.keys(value).sort();
              const sortedExpectedKeys = [...expectedKeys].sort();
              return (
                actualKeys.length === sortedExpectedKeys.length &&
                actualKeys.every((key, index) => key === sortedExpectedKeys[index])
              );
            };
            const isBoundedText = (value, maximumLength, minimumLength = 1) => {
              if (typeof value !== 'string') {
                return false;
              }
              const textLength = [...value.trim()].length;
              return (
                textLength >= minimumLength &&
                textLength <= maximumLength &&
                !/[\u0000-\u001f\u007f-\u009f]/u.test(value) &&
                !/(?:https?:\/\/|www\.)/iu.test(value)
              );
            };
            const isRepositoryPath = (value, maximumLength = 4096) => {
              if (
                typeof value !== 'string' ||
                [...value].length === 0 ||
                [...value].length > maximumLength ||
                /[\u0000-\u001f\u007f-\u009f]/u.test(value) ||
                value.startsWith('/') ||
                value.endsWith('/') ||
                /^[A-Za-z]:/u.test(value)
              ) {
                return false;
              }
              return value
                .split('/')
                .every((segment) => segment.length > 0 && segment !== '.' && segment !== '..');
            };
            const isFinding = (finding) =>
              hasExactKeys(finding, findingKeys) &&
              findingCategories.includes(finding.category) &&
              ['HIGH', 'MEDIUM', 'LOW'].includes(finding.severity) &&
              isRepositoryPath(finding.path, 260) &&
              Number.isSafeInteger(finding.line) &&
              finding.line >= 1 &&
              finding.line <= 10_000_000 &&
              isBoundedText(finding.title, 120) &&
              isBoundedText(finding.reason, 700) &&
              isBoundedText(finding.impact, 500) &&
              isBoundedText(finding.recommendation, 500);
            const isReviewArea = (area) =>
              hasExactKeys(area, ['evidence', 'result']) &&
              ['PASS', 'ISSUE', 'NOT_APPLICABLE', 'NOT_REVIEWED'].includes(area.result) &&
              isBoundedText(area.evidence, 500, 30);
            const isReviewAreas = (areas) =>
              hasExactKeys(areas, reviewAreaKeys) &&
              reviewAreaKeys.every((area) => isReviewArea(areas[area]));
            const hasUniqueItems = (values) =>
              new Set(values.map((value) => JSON.stringify(value))).size === values.length;
            const isReview = (review, changedPaths) => {
              if (
                !hasExactKeys(review, rootKeys) ||
                !['PASS', 'CHANGES_REQUESTED', 'BLOCKED'].includes(review.status) ||
                !isBoundedText(review.changeSummary, 1000, 20) ||
                !isBoundedText(review.summary, 600, 20) ||
                !isBoundedText(review.regressionRisk, 700, 20) ||
                !isReviewAreas(review.reviewAreas) ||
                !Array.isArray(review.findings) ||
                review.findings.length > 12 ||
                !review.findings.every(isFinding) ||
                !review.findings.every((finding) => changedPaths.has(finding.path)) ||
                !hasUniqueItems(review.findings) ||
                !Array.isArray(review.verificationLimits) ||
                review.verificationLimits.length > 8 ||
                !review.verificationLimits.every((limit) => isBoundedText(limit, 300)) ||
                !hasUniqueItems(review.verificationLimits)
              ) {
                return false;
              }
              const areaResults = reviewAreaKeys.map((area) => review.reviewAreas[area].result);
              const hasIssue = areaResults.includes('ISSUE');
              const hasNotReviewed = areaResults.includes('NOT_REVIEWED');
              const findingAreas = review.findings.map(
                (finding) => findingCategoryToArea[finding.category],
              );
              const findingsMatchIssueAreas =
                findingAreas.every((area) => review.reviewAreas[area].result === 'ISSUE') &&
                reviewAreaKeys
                  .filter((area) => review.reviewAreas[area].result === 'ISSUE')
                  .every((area) => findingAreas.includes(area));
              if (review.status === 'PASS') {
                return (
                  review.findings.length === 0 &&
                  !hasIssue &&
                  !hasNotReviewed
                );
              }
              if (review.status === 'CHANGES_REQUESTED') {
                return (
                  review.findings.length > 0 &&
                  hasIssue &&
                  !hasNotReviewed &&
                  findingsMatchIssueAreas
                );
              }
              return (
                review.findings.length === 0 &&
                review.verificationLimits.length > 0 &&
                !hasIssue &&
                hasNotReviewed
              );
            };
            const parseReview = (changedPaths) => {
              if (process.env.CODEX_REVIEW_JOB_RESULT !== 'success') {
                return blockedReview;
              }
              const raw = process.env.CODEX_REVIEW_JSON ?? '';
              if (Buffer.byteLength(raw, 'utf8') === 0 || Buffer.byteLength(raw, 'utf8') > maximumBytes) {
                return blockedReview;
              }
              try {
                const candidate = JSON.parse(raw);
                return isReview(candidate, changedPaths) ? candidate : blockedReview;
              } catch {
                return blockedReview;
              }
            };
            const escapeText = (value) => {
              let escaped = value
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('@', '@\u200b');
              for (const character of ['\\', '`', '*', '_', '[', ']', '{', '}', '(', ')', '#', '+', '!', '|', '~']) {
                escaped = escaped.replaceAll(character, `\\${character}`);
              }
              return escaped;
            };
            const renderCode = (value) =>
              `<code>${value
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#39;')
                .replaceAll('@', '@\u200b')}</code>`;
            const reviewAreaLabels = {
              userImpact: '사용자 영향',
              correctness: '정확성',
              stateHandling: '상태 처리',
              asyncFlow: '비동기 흐름',
              accessibility: '접근성',
              testCoverage: '테스트',
              readability: '가독성',
              predictability: '예측 가능성',
              cohesion: '응집도',
              coupling: '결합도',
              architecture: '구조·FSD',
              security: '보안',
              performance: '성능',
            };
            const reviewResultLabels = {
              PASS: '검토 완료',
              ISSUE: '문제 발견',
              NOT_APPLICABLE: '해당 없음',
              NOT_REVIEWED: '미검토',
            };
            const findingCategoryLabels = {
              USER_IMPACT: '사용자 영향',
              CORRECTNESS: '정확성',
              STATE_HANDLING: '상태 처리',
              ASYNC_FLOW: '비동기 흐름',
              ACCESSIBILITY: '접근성',
              TEST_COVERAGE: '테스트',
              READABILITY: '가독성',
              PREDICTABILITY: '예측 가능성',
              COHESION: '응집도',
              COUPLING: '결합도',
              ARCHITECTURE: '구조·FSD',
              SECURITY: '보안',
              PERFORMANCE: '성능',
            };
            const renderReview = (review, metadata) => {
              const bodyLines = [
                marker,
                '## Codex 자동 리뷰',
                '',
                `**상태:** ${review.status}`,
                `**검토 범위:** \`${metadata.reviewedBaseSha}...${metadata.reviewedHeadSha}\``,
                `**검토 커밋:** \`${metadata.reviewedHeadSha}\``,
                `**정책 커밋:** \`${metadata.reviewPolicySha}\``,
                `**변경 파일:** ${metadata.changedFileCount}개`,
                '',
                '### 변경 요약',
                '',
                escapeText(review.changeSummary),
                '',
                '### 종합 판단',
                '',
                escapeText(review.summary),
                '',
                '### 회귀 위험',
                '',
                escapeText(review.regressionRisk),
                '',
                '### 검토 체크포인트',
                '',
                '| 항목 | 판정 | 근거 |',
                '| --- | --- | --- |',
              ];

              for (const area of reviewAreaKeys) {
                const assessment = review.reviewAreas[area];
                bodyLines.push(
                  `| ${reviewAreaLabels[area]} | ${reviewResultLabels[assessment.result]} | ${escapeText(assessment.evidence)} |`,
                );
              }

              bodyLines.push('', '### 발견된 문제');
              if (review.findings.length > 0) {
                for (const [index, finding] of review.findings.entries()) {
                  bodyLines.push(
                    '',
                    `#### ${index + 1}. [${finding.severity}] ${escapeText(finding.title)}`,
                    `- **범주:** ${findingCategoryLabels[finding.category]} (${escapeText(finding.category)})`,
                    `- **위치:** ${renderCode(`${finding.path}:${finding.line}`)}`,
                    `- **이유:** ${escapeText(finding.reason)}`,
                    `- **영향:** ${escapeText(finding.impact)}`,
                    `- **수정 방향:** ${escapeText(finding.recommendation)}`,
                  );
                }
              } else {
                bodyLines.push('- 없음');
              }

              bodyLines.push('', '### 검증 제한');
              bodyLines.push(
                '- **리뷰 방식:** 읽기 전용 정적 변경분 리뷰이며 프로젝트 명령, 브라우저와 외부 네트워크를 직접 실행하지 않습니다.',
              );
              if (review.verificationLimits.length > 0) {
                for (const limit of review.verificationLimits) {
                  bodyLines.push(`- ${escapeText(limit)}`);
                }
              }
              bodyLines.push(
                '',
                '> 이 자동 리뷰는 참고 의견이며 사람의 최종 승인과 병합 판단을 대체하지 않습니다.',
              );
              return bodyLines.join('\n');
            };

            const requestedBaseSha = process.env.REVIEWED_BASE_SHA ?? '';
            const requestedHeadSha = process.env.REVIEWED_HEAD_SHA ?? '';
            const requestedPolicySha = process.env.REVIEW_POLICY_SHA ?? '';
            const requestedChangedFileCount = process.env.REVIEWED_CHANGED_FILE_COUNT ?? '';
            if (
              !/^[0-9a-f]{40}$/u.test(requestedBaseSha) ||
              !/^[0-9a-f]{40}$/u.test(requestedHeadSha) ||
              !/^[0-9a-f]{40}$/u.test(requestedPolicySha) ||
              !/^(?:0|[1-9]\d*)$/u.test(requestedChangedFileCount)
            ) {
              throw new Error('Trusted review metadata is invalid');
            }
            const reviewedChangedFileCount = Number(requestedChangedFileCount);
            if (!Number.isSafeInteger(reviewedChangedFileCount)) {
              throw new Error('Trusted changed-file count is invalid');
            }

            const pullRequestParameters = {
              ...context.repo,
              pull_number: context.issue.number,
            };
            const pullRequestMatchesReviewedState = async () => {
              const response = await github.rest.pulls.get(pullRequestParameters);
              const pullRequest = response.data;
              if (
                !isPlainObject(pullRequest) ||
                !isPlainObject(pullRequest.base) ||
                !isPlainObject(pullRequest.head) ||
                typeof pullRequest.base.sha !== 'string' ||
                typeof pullRequest.head.sha !== 'string' ||
                !Number.isSafeInteger(pullRequest.changed_files)
              ) {
                throw new Error('Pull request metadata is invalid');
              }
              return (
                pullRequest.base.sha === requestedBaseSha &&
                pullRequest.head.sha === requestedHeadSha &&
                pullRequest.changed_files === reviewedChangedFileCount
              );
            };
            if (!(await pullRequestMatchesReviewedState())) {
              return;
            }

            const pullFileParameters = {
              ...pullRequestParameters,
              per_page: 100,
            };
            const pullRequestFiles = await github.paginate(
              github.rest.pulls.listFiles,
              pullFileParameters,
            );
            const changedPaths = new Set();
            let manifestIsValid = true;
            for (const file of pullRequestFiles) {
              if (!isPlainObject(file) || !isRepositoryPath(file.filename)) {
                manifestIsValid = false;
                continue;
              }
              changedPaths.add(file.filename);
            }
            if (!(await pullRequestMatchesReviewedState())) {
              return;
            }

            const manifestIsComplete =
              manifestIsValid &&
              pullRequestFiles.length === reviewedChangedFileCount &&
              changedPaths.size === reviewedChangedFileCount;
            const incompleteManifestReview = {
              ...blockedReview,
              changeSummary: '변경 파일 목록을 완전하게 확인하지 못해 자동 리뷰 범위를 확정할 수 없습니다.',
              regressionRisk: '일부 변경 파일이 검토 범위에서 빠질 수 있어 회귀 위험을 안전하게 판정할 수 없습니다.',
              summary: 'GitHub가 보고한 변경 파일 수와 검증 가능한 파일 목록이 일치하지 않습니다.',
              verificationLimits: [
                '변경 파일 목록을 완전하게 확인하지 못했습니다. PR 규모와 Actions 로그를 확인해 주세요.',
              ],
            };
            const review = manifestIsComplete
              ? parseReview(changedPaths)
              : incompleteManifestReview;
            const metadata = {
              changedFileCount: reviewedChangedFileCount,
              reviewedBaseSha: requestedBaseSha,
              reviewedHeadSha: requestedHeadSha,
              reviewPolicySha: requestedPolicySha,
            };
            let body = renderReview(review, metadata);
            if (Buffer.byteLength(body, 'utf8') > maximumBytes) {
              body = renderReview(blockedReview, metadata);
            }
            if (Buffer.byteLength(body, 'utf8') > maximumBytes) {
              throw new Error('Generated review feedback exceeds the byte limit');
            }
            const parameters = {
              ...context.repo,
              issue_number: context.issue.number,
              per_page: 100,
            };

            const comments = await github.paginate(github.rest.issues.listComments, parameters);
            if (!(await pullRequestMatchesReviewedState())) {
              return;
            }
            const ownedComments = comments
              .filter(
                (comment) =>
                  typeof comment.body === 'string' &&
                  comment.body.startsWith(`${marker}\n`) &&
                  comment.user?.type === 'Bot' &&
                  comment.user.login === 'github-actions[bot]',
              )
              .sort((left, right) => left.id - right.id);
            const canonicalComment = ownedComments[0];

            if (canonicalComment && canonicalComment.body !== body) {
              await github.rest.issues.updateComment({
                ...context.repo,
                comment_id: canonicalComment.id,
                body,
              });
            } else if (!canonicalComment) {
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: context.issue.number,
                body,
              });
            }

            for (const duplicate of ownedComments.slice(1)) {
              await github.rest.issues.deleteComment({
                ...context.repo,
                comment_id: duplicate.id,
              });
            }
